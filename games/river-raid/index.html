<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>River Raid Clone</title>
<style>
  html, body {
    margin: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Courier New', monospace;
    color: #0f0;
    -webkit-tap-highlight-color: transparent;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 420px;
    padding: 6px 10px;
    box-sizing: border-box;
    font-size: 15px;
  }
  #livesBox { display: flex; gap: 4px; align-items: center; }
  #fuelBarOuter {
    width: 80px; height: 12px;
    border: 1px solid #0f0;
    background: #111;
  }
  #fuelBarInner {
    height: 100%;
    background: linear-gradient(90deg, #ff3030, #ffd700, #30ff30);
    width: 100%;
  }
  canvas {
    background: #1830d8;
    border: 4px solid #444;
    image-rendering: pixelated;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.8);
    color: #fff;
    text-align: center;
    flex-direction: column;
  }
  #wrap { position: relative; }
  #overlayTitle { font-size: 30px; color: #ffd700; margin-bottom: 6px; }
  #overlayText { font-size: 16px; white-space: pre-line; margin-bottom: 10px; }
  #overlay button {
    font-size: 18px;
    padding: 8px 22px;
    cursor: pointer;
    background: #ffd700;
    border: none;
    border-radius: 4px;
    font-weight: bold;
  }
  #hint {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
    text-align: center;
  }
  #touchControls {
    display: flex;
    gap: 14px;
    margin-top: 10px;
  }
  #touchControls button {
    width: 64px;
    height: 56px;
    font-size: 20px;
    background: #222;
    color: #0f0;
    border: 2px solid #0f0;
    border-radius: 8px;
    user-select: none;
  }
  #touchControls button:active { background: #0f0; color: #000; }
</style>
</head>
<body>
  <div id="ui">
    <div>SKOR: <span id="score">0</span></div>
    <div>EN İYİ: <span id="highscore">0</span></div>
    <div id="fuelBarOuter"><div id="fuelBarInner"></div></div>
    <div id="livesBox">CAN: <canvas id="livesCanvas" width="60" height="20"></canvas></div>
  </div>
  <div id="wrap">
    <canvas id="game" width="400" height="600"></canvas>
    <div id="overlay">
      <div id="overlayTitle">RIVER RAID</div>
      <div id="overlayText">Nehir boyunca uç, köprüleri vur, yakıtını doldur.</div>
      <button id="startBtn">Başla</button>
    </div>
  </div>
  <div id="hint">Yön tuşları / WASD: hareket | Space: ateş | P: duraklat</div>
  <div id="touchControls">
    <button id="btnLeft">◀</button>
    <button id="btnFire">●</button>
    <button id="btnRight">▶</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const livesCanvas = document.getElementById('livesCanvas');
const livesCtx = livesCanvas.getContext('2d');

const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const fuelBarInner = document.getElementById('fuelBarInner');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayText = document.getElementById('overlayText');
const startBtn = document.getElementById('startBtn');

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ---------- Sound (synthesized, no assets needed) ----------
let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function beep(freq, dur, type, vol, slideTo) {
  try {
    const ctxA = audio();
    const osc = ctxA.createOscillator();
    const gain = ctxA.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ctxA.currentTime);
    if (slideTo) osc.frequency.linearRampToValueAtTime(slideTo, ctxA.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.15, ctxA.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctxA.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctxA.destination);
    osc.start();
    osc.stop(ctxA.currentTime + dur);
  } catch (e) { /* audio unavailable, ignore */ }
}
function noiseBurst(dur, vol) {
  try {
    const ctxA = audio();
    const bufferSize = ctxA.sampleRate * dur;
    const buffer = ctxA.createBuffer(1, bufferSize, ctxA.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctxA.createBufferSource();
    src.buffer = buffer;
    const gain = ctxA.createGain();
    gain.gain.setValueAtTime(vol || 0.25, ctxA.currentTime);
    src.connect(gain);
    gain.connect(ctxA.destination);
    src.start();
  } catch (e) { /* ignore */ }
}
const sfx = {
  shoot: () => beep(900, 0.07, 'square', 0.08, 600),
  explosion: () => noiseBurst(0.3, 0.3),
  pickup: () => beep(400, 0.18, 'sine', 0.15, 900),
  crash: () => { noiseBurst(0.4, 0.35); beep(150, 0.4, 'sawtooth', 0.2, 40); },
  bridge: () => { noiseBurst(0.35, 0.3); beep(220, 0.3, 'square', 0.2, 60); },
  levelup: () => { beep(523, 0.12, 'square', 0.15, 784); }
};

// ---------- River geometry ----------
// World y ("d") is total distance travelled — always increasing. The river's
// shape is a pure function of distance (smooth overlapping sine waves), so
// there is no segment list to generate/prune/desync: riverAt(d) is always
// correct for any distance, past or future, with zero state.
function riverAt(d) {
  const center = W / 2
    + Math.sin(d * 0.0042) * 75
    + Math.sin(d * 0.0011 + 1.3) * 45
    + Math.sin(d * 0.0027 + 2.1) * 22;
  const width = 150
    + Math.sin(d * 0.0021 + 0.6) * 38
    + Math.sin(d * 0.00065) * 26
    + Math.sin(d * 0.0034 + 0.9) * 18;
  let left = center - width / 2;
  let right = center + width / 2;
  left = clamp(left, 14, W - 170);
  right = clamp(right, left + 100, W - 14);
  return { left, right };
}

// An island/rock occasionally splits the river into two narrower channels.
// Returns null when there's no island at this distance.
function islandAt(d) {
  if (d < 400) return null; // keep the area around the player's start clear
  const phase = (d * 0.00048) % (Math.PI * 2);
  const presence = Math.sin(phase * 2.6 + 1.7);
  if (presence < 0.74) return null;
  const r = riverAt(d);
  const totalW = r.right - r.left;
  if (totalW < 130) return null;
  const islandCenter = r.left + totalW / 2 + Math.sin(d * 0.0013) * totalW * 0.15;
  const islandW = clamp(totalW * 0.32, 26, 70);
  const left = islandCenter - islandW / 2;
  const right = islandCenter + islandW / 2;
  if (left - r.left < 40 || r.right - right < 40) return null;
  return { left, right };
}

function worldToScreenY(d) { return H + scrollY - d; }

// ---------- Bridges (every BRIDGE_SPACING units, must be shot to pass) ----------
const BRIDGE_SPACING = 1400;
const BRIDGE_HP = 3;
let bridges = new Map(); // index -> { hp, destroyed, scored }

function bridgeIndexAt(d) { return Math.round(d / BRIDGE_SPACING); }
function getBridge(index) {
  if (index <= 0) return null;
  if (!bridges.has(index)) bridges.set(index, { hp: BRIDGE_HP, destroyed: false, scored: false });
  return bridges.get(index);
}

// ---------- Game State ----------
let player = null, bullets = [], enemies = [], fuelDepots = [], particles = [];
let scrollY = 0;
let scrollSpeed = 2;
let baseSpeed = 2;
let score = 0;
let fuel = 100;
let lives = 3;
let level = 1;
let running = false;
let paused = false;
let gameOver = false;
let spawnTimer = 0;
let highScore = Number(localStorage.getItem('riverRaidHighScore') || 0);
highscoreEl.textContent = highScore;

function resetGame() {
  scrollY = 0;
  const startWorldY = H - (H - 100);
  const r0 = riverAt(startWorldY);
  player = {
    x: (r0.left + r0.right) / 2, y: H - 100, w: 22, h: 28,
    speed: 3.2, alive: true, cooldown: 0, invuln: 0
  };
  bullets = [];
  enemies = [];
  fuelDepots = [];
  particles = [];
  bridges = new Map();
  scrollY = 0;
  baseSpeed = 2;
  scrollSpeed = baseSpeed;
  score = 0;
  fuel = 100;
  lives = 3;
  level = 1;
  gameOver = false;
  spawnTimer = 60;
}

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key.toLowerCase() === 'p' && running && !gameOver) paused = !paused;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function bindHold(el, key) {
  const set = v => e => { e.preventDefault(); keys[key] = v; };
  el.addEventListener('touchstart', set(true), { passive: false });
  el.addEventListener('touchend', set(false));
  el.addEventListener('mousedown', set(true));
  el.addEventListener('mouseup', set(false));
  el.addEventListener('mouseleave', set(false));
}
bindHold(document.getElementById('btnLeft'), 'arrowleft');
bindHold(document.getElementById('btnRight'), 'arrowright');
bindHold(document.getElementById('btnFire'), ' ');

startBtn.addEventListener('click', () => {
  audio(); // unlock audio on user gesture
  overlay.style.display = 'none';
  resetGame();
  running = true;
  paused = false;
});

// ---------- Spawning ----------
function pickSpawnX(topY, halfW) {
  const r = riverAt(topY);
  const island = islandAt(topY);
  if (island) {
    // pick whichever channel (left of island or right of island) is wider
    const leftChan = { lo: r.left, hi: island.left };
    const rightChan = { lo: island.right, hi: r.right };
    const chan = (leftChan.hi - leftChan.lo) > (rightChan.hi - rightChan.lo) ? leftChan : rightChan;
    const lo = chan.lo + halfW + 4, hi = chan.hi - halfW - 4;
    if (hi <= lo) return null;
    return lo + Math.random() * (hi - lo);
  }
  const lo = r.left + halfW + 4, hi = r.right - halfW - 4;
  if (hi <= lo) return null;
  return lo + Math.random() * (hi - lo);
}

function spawnEntity() {
  const topY = scrollY + H + 40;
  // don't spawn on top of an upcoming bridge
  if (Math.abs(topY % BRIDGE_SPACING) < 60) return;
  const roll = Math.random();
  const difficulty = Math.min(level, 8);
  if (roll < 0.28) {
    const x = pickSpawnX(topY, 13);
    if (x === null) return;
    enemies.push({ type: 'ship', x, y: topY, w: 26, h: 16, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 0.5 + difficulty * 0.05 });
  } else if (roll < 0.52) {
    const x = pickSpawnX(topY, 12);
    if (x === null) return;
    enemies.push({ type: 'helicopter', x, y: topY, w: 24, h: 18, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 1 + difficulty * 0.08, flapTimer: 0 });
  } else if (roll < 0.74) {
    const x = pickSpawnX(topY, 10);
    if (x === null) return;
    enemies.push({ type: 'jet', x, y: topY, w: 20, h: 22, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 1.8 + difficulty * 0.1, zig: Math.random() * Math.PI * 2 });
  } else if (roll < 0.88 && level >= 2) {
    const x = pickSpawnX(topY, 18);
    if (x === null) return;
    enemies.push({ type: 'tanker', x, y: topY, w: 36, h: 20, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 0.3 + difficulty * 0.03 });
  } else {
    const x = pickSpawnX(topY, 10);
    if (x === null) return;
    fuelDepots.push({ x, y: topY, w: 20, h: 30, alive: true });
  }
}

// ---------- Update ----------
function update() {
  if (!running || paused || gameOver) return;

  scrollY += scrollSpeed;

  // player movement
  if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
  if (keys['arrowright'] || keys['d']) player.x += player.speed;
  if (keys['arrowup'] || keys['w']) scrollSpeed = Math.min(scrollSpeed + 0.05, baseSpeed + 2.5);
  else if (keys['arrowdown'] || keys['s']) scrollSpeed = Math.max(scrollSpeed - 0.08, 0.6);
  else scrollSpeed += (baseSpeed - scrollSpeed) * 0.02;

  if (player.invuln > 0) player.invuln--;

  // shooting
  if (player.cooldown > 0) player.cooldown--;
  if (keys[' '] && player.cooldown === 0 && player.alive) {
    bullets.push({ x: player.x, y: H + scrollY - player.y, vy: 9 });
    player.cooldown = 9;
    sfx.shoot();
  }

  // fuel consumption
  fuel -= 0.055 * (scrollSpeed / baseSpeed);
  if (fuel <= 0) {
    fuel = 0;
    killPlayer();
  }

  // bank / island collision
  const worldY = H + scrollY - player.y;
  const banks = riverAt(worldY);
  const island = islandAt(worldY);
  let hitObstacle = player.x - player.w / 2 < banks.left || player.x + player.w / 2 > banks.right;
  if (!hitObstacle && island && player.x + player.w / 2 > island.left && player.x - player.w / 2 < island.right) {
    hitObstacle = true;
  }
  if (player.invuln === 0 && hitObstacle) {
    killPlayer();
  }
  player.x = clamp(player.x, 10, W - 10);

  // bridge collision / crossing
  const bIndex = bridgeIndexAt(worldY);
  const bridgeWorldY = bIndex * BRIDGE_SPACING;
  if (bIndex > 0 && Math.abs(worldY - bridgeWorldY) < 10) {
    const bridge = getBridge(bIndex);
    if (!bridge.destroyed) {
      if (player.invuln === 0) killPlayer();
    } else if (!bridge.scored) {
      bridge.scored = true;
      score += 200;
      level++;
      baseSpeed = Math.min(baseSpeed + 0.3, 6);
      fuel = Math.min(100, fuel + 25);
      sfx.levelup();
    }
  }

  // spawn entities
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnEntity();
    spawnTimer = Math.max(25, 55 - level * 2) + Math.random() * 30;
  }

  // bullets
  for (const b of bullets) b.y += b.vy;
  bullets = bullets.filter(b => worldToScreenY(b.y) > -50);

  // enemies movement
  for (const e of enemies) {
    if (!e.alive) continue;
    const r = riverAt(e.y);
    if (e.type === 'jet') {
      e.zig += 0.08;
      e.x += Math.sin(e.zig) * 1.6;
    } else {
      e.x += e.dir * e.speed;
      if (e.x - e.w / 2 < r.left || e.x + e.w / 2 > r.right) e.dir *= -1;
    }
    e.x = clamp(e.x, r.left + e.w / 2, r.right - e.w / 2);
    if (e.type === 'helicopter') e.flapTimer++;
  }

  // remove enemies that have drifted onto an island (avoids them getting stuck inside it)
  for (const e of enemies) {
    if (!e.alive) continue;
    const island = islandAt(e.y);
    if (island && e.x + e.w / 2 > island.left && e.x - e.w / 2 < island.right) {
      e.dir *= -1;
      e.x += e.dir * e.speed * 3;
    }
  }

  enemies = enemies.filter(e => {
    const sy = worldToScreenY(e.y);
    return sy < H + 80 && sy > -80;
  });
  fuelDepots = fuelDepots.filter(f => {
    const sy = worldToScreenY(f.y);
    return sy < H + 80 && sy > -80;
  });

  // bullets vs bridges
  if (bIndex > 0) {
    const bridge = getBridge(bIndex);
    if (!bridge.destroyed) {
      for (const b of bullets) {
        if (Math.abs(b.y - bridgeWorldY) < 10) {
          bridge.hp--;
          b.hit = true;
          spawnParticles(b.x, worldToScreenY(bridgeWorldY));
          if (bridge.hp <= 0) {
            bridge.destroyed = true;
            score += 50;
            sfx.bridge();
          }
        }
      }
    }
  }

  // bullets vs enemies / fuel depots
  for (const b of bullets) {
    if (b.hit) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      const sy = worldToScreenY(e.y);
      const sby = worldToScreenY(b.y);
      if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(sby - sy) < e.h / 2) {
        e.alive = false;
        b.hit = true;
        const pts = { ship: 30, helicopter: 60, jet: 100, tanker: 80 }[e.type] || 30;
        score += pts;
        spawnParticles(e.x, sy);
        sfx.explosion();
      }
    }
    for (const f of fuelDepots) {
      if (!f.alive) continue;
      const sy = worldToScreenY(f.y);
      const sby = worldToScreenY(b.y);
      if (Math.abs(b.x - f.x) < f.w / 2 && Math.abs(sby - sy) < f.h / 2) {
        f.alive = false;
        b.hit = true;
        score = Math.max(0, score - 20);
        spawnParticles(f.x, sy);
        sfx.explosion();
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);

  // player vs enemies / fuel depots
  if (player.alive && player.invuln === 0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const sy = worldToScreenY(e.y);
      if (Math.abs(player.x - e.x) < (e.w + player.w) / 2 && Math.abs(player.y - sy) < (e.h + player.h) / 2) {
        e.alive = false;
        killPlayer();
      }
    }
    for (const f of fuelDepots) {
      if (!f.alive) continue;
      const sy = worldToScreenY(f.y);
      if (Math.abs(player.x - f.x) < (f.w + player.w) / 2 && Math.abs(player.y - sy) < (f.h + player.h) / 2) {
        if (fuel < 100) sfx.pickup();
        fuel = Math.min(100, fuel + 1.2);
      }
    }
  }

  enemies = enemies.filter(e => e.alive);

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);

  score += scrollSpeed * 0.04;

  scoreEl.textContent = Math.floor(score);
  fuelBarInner.style.width = fuel + '%';
}

function spawnParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 20 + Math.random() * 14
    });
  }
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  spawnParticles(player.x, player.y);
  sfx.crash();
  lives--;
  setTimeout(() => {
    if (lives <= 0) {
      gameOver = true;
      if (Math.floor(score) > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('riverRaidHighScore', highScore);
        highscoreEl.textContent = highScore;
      }
      showOverlay('OYUN BİTTİ', `Skor: ${Math.floor(score)}\nSeviye: ${level}\nEn iyi: ${highScore}`, true);
    } else {
      player.alive = true;
      player.invuln = 90;
      const r0 = riverAt(H + scrollY - player.y);
      player.x = (r0.left + r0.right) / 2;
      fuel = Math.max(fuel, 60);
    }
  }, 700);
}

function showOverlay(title, text, isGameOver) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  overlay.style.display = 'flex';
  if (isGameOver) startBtn.textContent = 'Tekrar Başla';
  running = false;
}

// ---------- Render helpers ----------
function drawPlane(c, x, y, w, h, color) {
  c.save();
  c.translate(x, y);
  c.fillStyle = color;
  c.beginPath();
  c.moveTo(0, -h / 2);
  c.lineTo(w * 0.16, -h * 0.12);
  c.lineTo(-w * 0.16, -h * 0.12);
  c.closePath();
  c.fill();
  c.fillRect(-w * 0.08, -h * 0.12, w * 0.16, h * 0.55);
  c.fillRect(-w / 2, h * 0.05, w, h * 0.16);
  c.fillRect(-w * 0.3, h * 0.32, w * 0.6, h * 0.16);
  c.restore();
}

function renderLives() {
  livesCtx.clearRect(0, 0, livesCanvas.width, livesCanvas.height);
  const extra = Math.max(0, lives - 1);
  for (let i = 0; i < extra; i++) {
    drawPlane(livesCtx, 10 + i * 16, 12, 12, 16, '#ffd700');
  }
}

// ---------- Render ----------
function render() {
  // grass background with subtle texture
  const grassGrad = ctx.createLinearGradient(0, 0, 0, H);
  grassGrad.addColorStop(0, '#1f6b1f');
  grassGrad.addColorStop(1, '#2d8c2d');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,40,0,0.25)';
  for (let i = 0; i < 70; i++) {
    const tx = (i * 53 + Math.floor(scrollY * 0.15)) % (W + 40) - 20;
    const ty = (i * 97) % H;
    ctx.fillRect(tx, ty, 5, 5);
  }

  // river: sample the continuous shape function at fixed screen-row intervals
  const STEP = 12;
  const points = [];
  for (let sy = -STEP; sy <= H + STEP; sy += STEP) {
    const d = H + scrollY - sy;
    const island = islandAt(d);
    points.push({ sy, ...riverAt(d), island });
  }

  const waterGrad = ctx.createLinearGradient(0, 0, W, 0);
  waterGrad.addColorStop(0, '#0d2aa0');
  waterGrad.addColorStop(0.5, '#1d4ce0');
  waterGrad.addColorStop(1, '#0d2aa0');
  ctx.fillStyle = waterGrad;
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.left, p.sy); else ctx.lineTo(p.left, p.sy); });
  for (let i = points.length - 1; i >= 0; i--) ctx.lineTo(points[i].right, points[i].sy);
  ctx.closePath();
  ctx.fill();

  // flowing current lines, scrolling with the river
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  const flowOffset = scrollY % 40;
  for (let sy = -flowOffset; sy <= H; sy += 40) {
    const d = H + scrollY - sy;
    const r = riverAt(d);
    const midL = r.left + (r.right - r.left) * 0.28;
    const midR = r.left + (r.right - r.left) * 0.72;
    ctx.beginPath();
    ctx.moveTo(midL, sy);
    ctx.lineTo(midL, sy + 16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(midR, sy);
    ctx.lineTo(midR, sy + 16);
    ctx.stroke();
  }

  ctx.strokeStyle = '#0a1f8c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.left, p.sy); else ctx.lineTo(p.left, p.sy); });
  ctx.stroke();
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.right, p.sy); else ctx.lineTo(p.right, p.sy); });
  ctx.stroke();

  // sandy bank edge highlight
  ctx.strokeStyle = '#c8a85a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.left + 2, p.sy); else ctx.lineTo(p.left + 2, p.sy); });
  ctx.stroke();
  ctx.beginPath();
  points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.right - 2, p.sy); else ctx.lineTo(p.right - 2, p.sy); });
  ctx.stroke();

  // islands: drawn as separate closed shapes per contiguous run of rows
  let run = [];
  function flushIslandRun() {
    if (run.length < 2) { run = []; return; }
    ctx.fillStyle = '#3a8a3a';
    ctx.beginPath();
    run.forEach((p, i) => { if (i === 0) ctx.moveTo(p.island.left, p.sy); else ctx.lineTo(p.island.left, p.sy); });
    for (let i = run.length - 1; i >= 0; i--) ctx.lineTo(run[i].island.right, run[i].sy);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#1f5a1f';
    ctx.lineWidth = 2;
    ctx.stroke();
    run = [];
  }
  for (const p of points) {
    if (p.island) run.push(p);
    else flushIslandRun();
  }
  flushIslandRun();

  // bridges
  const topWorldY = H + scrollY + STEP;
  const bottomWorldY = scrollY - STEP;
  const firstIdx = Math.max(1, Math.floor(bottomWorldY / BRIDGE_SPACING));
  const lastIdx = Math.ceil(topWorldY / BRIDGE_SPACING);
  for (let idx = firstIdx; idx <= lastIdx; idx++) {
    const bWorldY = idx * BRIDGE_SPACING;
    const sy = worldToScreenY(bWorldY);
    if (sy < -20 || sy > H + 20) continue;
    const bridge = getBridge(idx);
    const r = riverAt(bWorldY);
    if (bridge.destroyed) {
      // broken stubs on each bank
      ctx.fillStyle = '#7a5230';
      ctx.fillRect(r.left - 6, sy - 4, 16, 8);
      ctx.fillRect(r.right - 10, sy - 4, 16, 8);
    } else {
      ctx.fillStyle = '#9a7a4a';
      ctx.fillRect(r.left - 6, sy - 6, (r.right - r.left) + 12, 12);
      ctx.fillStyle = '#caa86a';
      ctx.fillRect(r.left - 6, sy - 6, (r.right - r.left) + 12, 3);
      // damage cracks based on remaining hp
      ctx.strokeStyle = '#5a3d1f';
      ctx.lineWidth = 1;
      for (let k = 0; k < (BRIDGE_HP - bridge.hp); k++) {
        const cx = r.left + 20 + k * 30;
        ctx.beginPath();
        ctx.moveTo(cx, sy - 6);
        ctx.lineTo(cx + 6, sy + 6);
        ctx.stroke();
      }
    }
  }

  // fuel depots
  for (const f of fuelDepots) {
    const sy = worldToScreenY(f.y);
    ctx.fillStyle = '#e0245a';
    ctx.fillRect(f.x - f.w / 2, sy - f.h / 2, f.w, f.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ['F', 'U', 'E', 'L'].forEach((ch, i) => ctx.fillText(ch, f.x, sy - f.h / 2 + 10 + i * 9));
  }

  // enemies
  for (const e of enemies) {
    const sy = worldToScreenY(e.y);
    if (e.type === 'ship') {
      ctx.save();
      ctx.translate(e.x, sy);
      ctx.fillStyle = '#3a3a3a';
      ctx.beginPath();
      ctx.moveTo(-e.w / 2, -e.h / 2 + 4);
      ctx.lineTo(e.w / 2 - 4, -e.h / 2 + 4);
      ctx.lineTo(e.w / 2, e.h / 2);
      ctx.lineTo(-e.w / 2, e.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#888';
      ctx.fillRect(-e.w / 2 + 4, -e.h / 2, e.w * 0.4, 6);
      ctx.fillStyle = '#c83c3c';
      ctx.fillRect(-2, -e.h / 2 - 4, 4, 4);
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(-e.w / 2, -e.h / 2 + 4, e.w, e.h - 4);
      ctx.restore();
    } else if (e.type === 'tanker') {
      ctx.save();
      ctx.translate(e.x, sy);
      ctx.fillStyle = '#5a4a2a';
      ctx.beginPath();
      ctx.moveTo(-e.w / 2, -e.h / 2 + 3);
      ctx.lineTo(e.w / 2 - 3, -e.h / 2 + 3);
      ctx.lineTo(e.w / 2, e.h / 2);
      ctx.lineTo(-e.w / 2, e.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#8a7440';
      ctx.fillRect(-e.w / 2 + 6, -e.h / 2 + 6, e.w - 12, e.h * 0.35);
      ctx.fillStyle = '#caa030';
      for (let k = 0; k < 3; k++) ctx.fillRect(-e.w / 2 + 8 + k * 10, -e.h / 2 + 6, 5, e.h * 0.35);
      ctx.strokeStyle = '#2a1f10';
      ctx.lineWidth = 1;
      ctx.strokeRect(-e.w / 2, -e.h / 2 + 3, e.w, e.h - 3);
      ctx.restore();
    } else if (e.type === 'jet') {
      ctx.save();
      ctx.translate(e.x, sy);
      ctx.fillStyle = '#c83c3c';
      ctx.beginPath();
      ctx.moveTo(0, e.h / 2);
      ctx.lineTo(e.w / 2, -e.h * 0.1);
      ctx.lineTo(e.w * 0.18, -e.h / 2);
      ctx.lineTo(-e.w * 0.18, -e.h / 2);
      ctx.lineTo(-e.w / 2, -e.h * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#7a1818';
      ctx.fillRect(-e.w * 0.1, e.h * 0.05, e.w * 0.2, e.h * 0.3);
      ctx.fillStyle = '#ffb030';
      ctx.beginPath();
      ctx.moveTo(-e.w * 0.08, e.h / 2);
      ctx.lineTo(e.w * 0.08, e.h / 2);
      ctx.lineTo(0, e.h / 2 + 6 + Math.random() * 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else {
      ctx.save();
      ctx.translate(e.x, sy);
      ctx.fillStyle = '#4a5a2a';
      ctx.beginPath();
      ctx.ellipse(0, 2, e.w * 0.4, e.h * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a4a1a';
      ctx.fillRect(-e.w * 0.1, e.h * 0.18, e.w * 0.2, e.h * 0.4);
      ctx.fillStyle = '#8fc6ff';
      ctx.beginPath();
      ctx.ellipse(-e.w * 0.12, -e.h * 0.02, e.w * 0.18, e.h * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 2;
      const blade = Math.sin(e.flapTimer * 0.6) * 13;
      ctx.beginPath();
      ctx.moveTo(-blade, -e.h / 2 - 1);
      ctx.lineTo(blade, -e.h / 2 - 1);
      ctx.stroke();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -e.h * 0.05);
      ctx.lineTo(e.w * 0.42, e.h * 0.32);
      ctx.stroke();
      ctx.restore();
    }
  }

  // bullets
  ctx.fillStyle = '#fff';
  for (const b of bullets) {
    const sy = worldToScreenY(b.y);
    ctx.fillRect(b.x - 1, sy - 5, 2, 8);
  }

  // particles
  for (const p of particles) {
    ctx.fillStyle = `rgba(255,${100 + Math.floor(Math.random() * 100)},0,${Math.max(p.life / 30, 0)})`;
    ctx.fillRect(p.x, p.y, 3, 3);
  }

  // player
  if (player && player.alive && (player.invuln === 0 || Math.floor(player.invuln / 4) % 2 === 0)) {
    drawPlane(ctx, player.x, player.y, player.w, player.h, '#ffd700');
  }

  renderLives();

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DURAKLATILDI', W / 2, H / 2);
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

resetGame();
showOverlay('RIVER RAID', 'Nehir boyunca uç, köprüleri vur, yakıtını doldur.');
loop();
</script>
</body>
</html>

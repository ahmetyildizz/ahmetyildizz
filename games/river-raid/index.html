<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>River Raid Clone</title>
<style>
  html, body {
    margin: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Courier New', monospace;
    color: #0f0;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    width: 400px;
    padding: 6px 10px;
    box-sizing: border-box;
    font-size: 16px;
  }
  canvas {
    background: #654321;
    border: 4px solid #444;
    image-rendering: pixelated;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 28px;
    text-align: center;
    flex-direction: column;
  }
  #overlay button {
    margin-top: 16px;
    font-size: 18px;
    padding: 8px 20px;
    cursor: pointer;
  }
  #hint {
    font-size: 12px;
    color: #999;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div id="ui">
    <div>SKOR: <span id="score">0</span></div>
    <div>YAKIT: <span id="fuel">100</span></div>
    <div>CAN: <span id="lives">3</span></div>
  </div>
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hint">Yön tuşları / WASD: hareket | Space: ateş | P: duraklat</div>

  <div id="overlay">
    <div id="overlayText">River Raid</div>
    <button id="startBtn">Başla</button>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const fuelEl = document.getElementById('fuel');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const startBtn = document.getElementById('startBtn');

// ---------- River geometry ----------
// World y is "distance traveled" — it only ever increases as the plane flies
// forward. Segments are kept sorted ascending by this distance. A segment at
// distance d is drawn at screen y = H + scrollY - d: the segment the plane is
// currently over (d == scrollY) sits at the plane (screen bottom); segments
// further ahead (d > scrollY) sit higher up, scrolling down into view as
// scrollY catches up; segments already passed (d < scrollY) sit below the
// screen and get pruned.
const SEGMENT_H = 20;
let segments = []; // {y: distance, left, right}

function worldToScreenY(d) { return H + scrollY - d; }

function initRiver() {
  segments = [];
  let left = 60, right = W - 60;
  for (let y = 0; y <= H + SEGMENT_H * 4; y += SEGMENT_H) {
    segments.push({ y, left, right });
  }
}

function genNextSegment() {
  const last = segments[segments.length - 1];
  let left = last.left, right = last.right;
  // randomly drift banks, keep min width
  const drift = (Math.random() - 0.5) * 14;
  left = clamp(left + drift, 20, W / 2 - 40);
  right = clamp(right + drift, W / 2 + 40, W - 20);
  segments.push({ y: last.y + SEGMENT_H, left, right });
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// returns river bank x positions for a given world distance by interpolating between segments
function riverAt(y) {
  for (let i = 0; i < segments.length - 1; i++) {
    const a = segments[i], b = segments[i + 1];
    if (y >= a.y && y <= b.y) {
      const t = (y - a.y) / (b.y - a.y || 1);
      return {
        left: a.left + (b.left - a.left) * t,
        right: a.right + (b.right - a.right) * t
      };
    }
  }
  return { left: 60, right: W - 60 };
}

// ---------- Game State ----------
let player = null, bullets = [], enemies = [], fuelDepots = [], particles = [];
let scrollY = 0;
let scrollSpeed = 2;
let score = 0;
let fuel = 100;
let lives = 3;
let frame = 0;
let running = false;
let paused = false;
let gameOver = false;
let spawnTimer = 0;

function resetGame() {
  initRiver();
  player = {
    x: W / 2, y: H - 100, w: 22, h: 28,
    vx: 0, speed: 3, alive: true, cooldown: 0
  };
  bullets = [];
  enemies = [];
  fuelDepots = [];
  particles = [];
  scrollY = 0;
  scrollSpeed = 2;
  score = 0;
  fuel = 100;
  lives = 3;
  frame = 0;
  gameOver = false;
  spawnTimer = 0;
}

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key.toLowerCase() === 'p' && running && !gameOver) {
    paused = !paused;
  }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  resetGame();
  running = true;
  paused = false;
});

// ---------- Spawning ----------
function spawnEntity() {
  const topY = scrollY + H + 40;
  const r = riverAt(topY);
  const x = r.left + Math.random() * (r.right - r.left - 24) + 12;
  const roll = Math.random();
  if (roll < 0.5) {
    enemies.push({ type: 'ship', x, y: topY, w: 26, h: 16, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 0.6 });
  } else if (roll < 0.8) {
    enemies.push({ type: 'helicopter', x, y: topY, w: 24, h: 18, dir: Math.random() < 0.5 ? -1 : 1, alive: true, speed: 1.2, flapTimer: 0 });
  } else {
    fuelDepots.push({ x, y: topY, w: 20, h: 30, alive: true });
  }
}

// ---------- Update ----------
function update() {
  if (!running || paused || gameOver) return;
  frame++;

  // scroll river
  scrollY += scrollSpeed;
  while (segments[segments.length - 1].y < scrollY + H + SEGMENT_H * 2) {
    genNextSegment();
  }
  segments = segments.filter(s => s.y > scrollY - SEGMENT_H * 4);

  // player movement
  if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
  if (keys['arrowright'] || keys['d']) player.x += player.speed;
  if (keys['arrowup'] || keys['w']) scrollSpeed = Math.min(scrollSpeed + 0.05, 5);
  else if (keys['arrowdown'] || keys['s']) scrollSpeed = Math.max(scrollSpeed - 0.08, 0.6);
  else scrollSpeed += (2 - scrollSpeed) * 0.02;

  // shooting
  if (player.cooldown > 0) player.cooldown--;
  if ((keys[' ']) && player.cooldown === 0 && player.alive) {
    bullets.push({ x: player.x, y: H + scrollY - player.y, vy: 8 });
    player.cooldown = 10;
  }

  // fuel consumption
  fuel -= 0.06 * (scrollSpeed / 2);
  if (fuel <= 0) {
    fuel = 0;
    killPlayer();
  }

  // bank collision
  const worldY = H + scrollY - player.y;
  const banks = riverAt(worldY);
  if (player.x - player.w / 2 < banks.left || player.x + player.w / 2 > banks.right) {
    killPlayer();
  }
  player.x = clamp(player.x, 10, W - 10);

  // spawn entities
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnEntity();
    spawnTimer = 60 + Math.random() * 40;
  }

  // update bullets
  for (const b of bullets) b.y += b.vy;
  bullets = bullets.filter(b => worldToScreenY(b.y) > -50);

  // update enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const r = riverAt(e.y);
    e.x += e.dir * e.speed;
    if (e.x - e.w / 2 < r.left || e.x + e.w / 2 > r.right) e.dir *= -1;
    if (e.type === 'helicopter') e.flapTimer++;
  }

  // remove offscreen entities
  enemies = enemies.filter(e => worldToScreenY(e.y) < H + 80 && worldToScreenY(e.y) > -80);
  fuelDepots = fuelDepots.filter(f => worldToScreenY(f.y) < H + 80 && worldToScreenY(f.y) > -80);

  // collisions: bullets vs enemies
  for (const b of bullets) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const sy = worldToScreenY(e.y);
      const sby = worldToScreenY(b.y);
      if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(sby - sy) < e.h / 2) {
        e.alive = false;
        b.hit = true;
        score += e.type === 'ship' ? 30 : 60;
        spawnParticles(e.x, sy);
      }
    }
    for (const f of fuelDepots) {
      if (!f.alive) continue;
      const sy = worldToScreenY(f.y);
      const sby = worldToScreenY(b.y);
      if (Math.abs(b.x - f.x) < f.w / 2 && Math.abs(sby - sy) < f.h / 2) {
        f.alive = false;
        b.hit = true;
        score -= 20;
        spawnParticles(f.x, sy);
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);

  // collisions: player vs enemies/fuel
  if (player.alive) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const sy = worldToScreenY(e.y);
      if (Math.abs(player.x - e.x) < (e.w + player.w) / 2 && Math.abs(player.y - sy) < (e.h + player.h) / 2) {
        e.alive = false;
        killPlayer();
      }
    }
    for (const f of fuelDepots) {
      if (!f.alive) continue;
      const sy = worldToScreenY(f.y);
      if (Math.abs(player.x - f.x) < (f.w + player.w) / 2 && Math.abs(player.y - sy) < (f.h + player.h) / 2) {
        fuel = Math.min(100, fuel + 1.2);
      }
    }
  }

  enemies = enemies.filter(e => e.alive);

  // particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);

  // score by survival/speed
  score += scrollSpeed * 0.05;

  scoreEl.textContent = Math.floor(score);
  fuelEl.textContent = Math.floor(fuel);
  livesEl.textContent = lives;
}

function spawnParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 20 + Math.random() * 10
    });
  }
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  spawnParticles(player.x, player.y);
  lives--;
  setTimeout(() => {
    if (lives <= 0) {
      gameOver = true;
      showOverlay('Oyun Bitti\nSkor: ' + Math.floor(score));
    } else {
      player.alive = true;
      player.x = W / 2;
      fuel = 100;
    }
  }, 800);
}

function showOverlay(text) {
  overlayText.textContent = text;
  overlay.style.display = 'flex';
  startBtn.textContent = 'Tekrar Başla';
  running = false;
}

// ---------- Render ----------
function render() {
  ctx.fillStyle = '#2d8c2d';
  ctx.fillRect(0, 0, W, H);

  // river
  ctx.fillStyle = '#1830d8';
  ctx.beginPath();
  segments.forEach((s, i) => {
    const sy = worldToScreenY(s.y);
    if (i === 0) ctx.moveTo(s.left, sy); else ctx.lineTo(s.left, sy);
  });
  for (let i = segments.length - 1; i >= 0; i--) {
    const s = segments[i];
    const sy = worldToScreenY(s.y);
    ctx.lineTo(s.right, sy);
  }
  ctx.closePath();
  ctx.fill();

  // banks edge highlight
  ctx.strokeStyle = '#0a1f8c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const sy = worldToScreenY(s.y);
    if (i === 0) ctx.moveTo(s.left, sy); else ctx.lineTo(s.left, sy);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const sy = worldToScreenY(s.y);
    if (i === 0) ctx.moveTo(s.right, sy); else ctx.lineTo(s.right, sy);
  }
  ctx.stroke();

  // fuel depots (red tank, vertical "FUEL" lettering like the original)
  for (const f of fuelDepots) {
    const sy = worldToScreenY(f.y);
    ctx.fillStyle = '#e0245a';
    ctx.fillRect(f.x - f.w / 2, sy - f.h / 2, f.w, f.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    const letters = ['F', 'U', 'E', 'L'];
    letters.forEach((ch, i) => {
      ctx.fillText(ch, f.x, sy - f.h / 2 + 10 + i * 9);
    });
  }

  // enemies
  for (const e of enemies) {
    const sy = worldToScreenY(e.y);
    if (e.type === 'ship') {
      // dark hull with a lighter deck stripe, like the river tanker sprite
      ctx.fillStyle = '#444';
      ctx.fillRect(e.x - e.w / 2, sy - e.h / 2, e.w, e.h);
      ctx.fillStyle = '#999';
      ctx.fillRect(e.x - e.w / 2 + 3, sy - 2, e.w - 6, 4);
    } else {
      // helicopter: body + cockpit bubble + spinning rotor
      ctx.fillStyle = '#5a6b3a';
      ctx.fillRect(e.x - e.w / 2, sy - e.h / 2, e.w, e.h);
      ctx.fillStyle = '#8fa6e0';
      ctx.fillRect(e.x - e.w / 2 + 2, sy - 2, 6, 6);
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 2;
      const blade = Math.sin(e.flapTimer * 0.6) * 12;
      ctx.beginPath();
      ctx.moveTo(e.x - blade, sy - e.h / 2 - 2);
      ctx.lineTo(e.x + blade, sy - e.h / 2 - 2);
      ctx.stroke();
    }
  }

  // bullets
  ctx.fillStyle = '#fff';
  for (const b of bullets) {
    const sy = worldToScreenY(b.y);
    ctx.fillRect(b.x - 1, sy - 5, 2, 8);
  }

  // particles
  for (const p of particles) {
    ctx.fillStyle = `rgba(255,${100 + Math.floor(Math.random()*100)},0,${Math.max(p.life / 30, 0)})`;
    ctx.fillRect(p.x, p.y, 3, 3);
  }

  // player: yellow jet, nose pointing up the river (direction of travel)
  if (player && player.alive) {
    const w = player.w, h = player.h;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = '#ffd700';
    // nose
    ctx.beginPath();
    ctx.moveTo(0, -h / 2);
    ctx.lineTo(w * 0.16, -h * 0.12);
    ctx.lineTo(-w * 0.16, -h * 0.12);
    ctx.closePath();
    ctx.fill();
    // fuselage
    ctx.fillRect(-w * 0.08, -h * 0.12, w * 0.16, h * 0.55);
    // wings
    ctx.fillRect(-w / 2, h * 0.05, w, h * 0.16);
    // tail fins
    ctx.fillRect(-w * 0.3, h * 0.32, w * 0.6, h * 0.16);
    ctx.restore();
  }

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DURAKLATILDI', W / 2, H / 2);
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

showOverlay('River Raid');
loop();
</script>
</body>
</html>
